info:
  name: Save New Bug Report
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/user-bug-report"
  body:
    type: multipart-form
    data:
      - name: interaction
        type: text
        value: write_us
        description: positive, negative, closed, favorite, write_us, opened
      - name: type
        type: text
        value: last_discount_activation_bug
        description: discount_activation_bug, last_discount_activation_bug
      - name: discount_id
        type: text
        value: "9"
      - name: brand_id
        type: text
        value: "9"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
