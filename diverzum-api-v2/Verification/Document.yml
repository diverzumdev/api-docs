info:
  name: Document
  type: http
  seq: 9

http:
  method: POST
  url: "{{base_url_v2}}/auth/verification/document"
  body:
    type: multipart-form
    data:
      - name: frontpage
        type: file
        value: []
      - name: backpage
        type: file
        value: []
      - name: gender
        type: text
        value: m
      - name: birthdate
        type: text
        value: 2020-01-01
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
